name: Mirror to Gitee
on:
  push:
    branches: ['**']

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitee
        env:
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          set -e
          AUTH="https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/Aptx2006/XCPC-CODE.git"
          git remote remove gitee || true
          git remote add gitee "$AUTH"
          # 推送所有分支并清理已删除的远程分支
          git push --prune --all gitee
          # 推送标签
          git push --tags gitee
