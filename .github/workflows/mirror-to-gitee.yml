name: Mirror to Gitee
on:
  push:
    branches: ['**']

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitee
        env:
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          set -e
          AUTH="https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/Aptx2006/XCPC-CODE.git"
          git remote remove gitee >/dev/null 2>&1 || true
          git remote add gitee "$AUTH"
          # 作为镜像仓库，使用强制镜像推送覆盖 Gitee 上的历史
          git push --mirror gitee
